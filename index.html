<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>brat_syla</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: black;
    color: white;
}

header {
    display: flex;
    justify-content: space-between;
    padding: 15px;
    border-bottom: 1px solid gold;
}

.logo {
    color: gold;
    font-weight: bold;
}

nav a {
    color: white;
    margin-left: 15px;
    text-decoration: none;
}

.hero {
    text-align: center;
    padding: 80px 20px;
}

button {
    background: gold;
    border: none;
    padding: 10px;
    cursor: pointer;
}

.catalog {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 20px;
    padding: 20px;
}

.card {
    border: 1px solid gold;
    padding: 10px;
}

.card img {
    width: 100%;
}

select {
    width: 100%;
    margin: 5px 0;
    padding: 5px;
}

.cart {
    position: fixed;
    right: 0;
    top: 0;
    width: 260px;
    background: black;
    border-left: 1px solid gold;
    padding: 15px;
    height: 100%;
    overflow-y: auto;
}

input {
    width: 100%;
    margin-bottom: 10px;
    padding: 8px;
}

</style>
</head>

<body>

<header>
<div class="logo">brat_syla</div>
<nav>
<a href="#">Головна</a>
<a href="#catalog">Каталог</a>
<a href="#contacts">Контакти</a>
</nav>
</header>

<section class="hero">
<h1>СИЛА СТИЛЮ</h1>
<p>Преміальні спортивні костюми</p>
<button onclick="scrollToCatalog()">В каталог</button>
</section>

<section id="catalog" class="catalog">

<div class="card">
<img src="https://via.placeholder.com/300">
<h3>Black Power</h3>
<p>2000 грн</p>

<select id="size1">
<option value="">Оберіть розмір</option>
<option>S</option>
<option>M</option>
<option>L</option>
<option>XL</option>
</select>

<button onclick="addToCart('Black Power', 2000, 'size1')">В кошик</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/300">
<h3>Gold Line</h3>
<p>2500 грн</p>

<select id="size2">
<option value="">Оберіть розмір</option>
<option>S</option>
<option>M</option>
<option>L</option>
<option>XL</option>
</select>

<button onclick="addToCart('Gold Line', 2500, 'size2')">В кошик</button>
</div>

</section>

<div class="cart">
<h3>Кошик</h3>
<div id="cartItems"></div>
<p id="total">Сума: 0 грн</p>

<h4>Оформлення</h4>
<input type="text" id="name" placeholder="Прізвище Імʼя">
<input type="text" id="phone" placeholder="Телефон">
<input type="text" id="address" placeholder="Нова пошта (місто + № відділення)">

<button onclick="checkout()">Оформити</button>
</div>

<section id="contacts" style="padding:20px;">
<h2>Контакти</h2>
<p>Instagram: @brat_syla</p>
<p>Телефон: +380...</p>
</section>

<script>
let cart = [];
let total = 0;

function addToCart(name, price, sizeId) {
    let size = document.getElementById(sizeId).value;

    if (!size) {
        alert("Оберіть розмір!");
        return;
    }

    cart.push({name, price, size});
    total += price;

    renderCart();
}

function renderCart() {
    let cartHTML = "";

    cart.forEach((item, index) => {
        cartHTML += `
        <p>${item.name} (${item.size}) - ${item.price} грн 
        <button onclick="removeItem(${index})">X</button></p>
        `;
    });

    document.getElementById("cartItems").innerHTML = cartHTML;
    document.getElementById("total").innerText = "Сума: " + total + " грн";
}

function removeItem(index) {
    total -= cart[index].price;
    cart.splice(index, 1);
    renderCart();
}

function checkout() {
    let name = document.getElementById("name").value;
    let phone = document.getElementById("phone").value;
    let address = document.getElementById("address").value;

    if (!name || !phone || !address) {
        alert("Заповніть всі поля!");
        return;
    }

    if (cart.length === 0) {
        alert("Кошик пустий!");
        return;
    }

    alert("Замовлення оформлено!");
}

function scrollToCatalog() {
    document.getElementById("catalog").scrollIntoView();
}
</script>

</body>
</html>
